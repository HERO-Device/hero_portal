<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HERO — Clinical Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <img src="assets/logo.png" class="loading-logo-img" alt="HERO">
  <div class="loading-bar-bg"><div class="loading-bar-fill"></div></div>
  <div class="loading-msg" id="loading-msg">Loading patient registry…</div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <img src="assets/logo.png" class="header-logo" alt="HERO">
      <div class="header-divider"></div>
      <span class="header-title">Clinical Dashboard</span>
    </div>
    <div class="header-right">
      <div class="header-stat">
        <span class="val" id="hdr-count">—</span>
        <span class="lbl">Sessions</span>
      </div>
      <div class="header-stat">
        <span class="val" id="hdr-date">—</span>
        <span class="lbl">Today</span>
      </div>
    </div>
  </div>

  <!-- Patient selector bar -->
  <div class="patient-bar">
    <div class="patient-bar-inner">
      <span class="patient-bar-label">Patient</span>
      <select id="patient-select"></select>
    </div>
  </div>

  <!-- Nav tabs -->
  <div class="nav" id="main-nav" style="display:none">
    <div class="nav-tab active" data-section="overview">Overview</div>
    <div class="nav-tab" data-section="sensors">Sensors</div>
    <div class="nav-tab" data-section="games">Games</div>
  </div>

  <!-- Main content -->
  <div class="main">

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="empty-title">Select a patient session</div>
      <div class="empty-body">Choose a session from the bar above to view cognitive performance metrics, sensor analysis, and game results.</div>
    </div>

    <!-- Overview section -->
    <div class="section" id="section-overview"></div>

    <!-- Sensors section -->
    <div class="section" id="section-sensors"></div>

    <!-- Games section -->
    <div class="section" id="section-games"></div>

  </div>
</div>

<script src="utils/data.js"></script>
<script src="utils/scores.js"></script>
<script src="utils/sensors.js"></script>
<script src="utils/charts.js"></script>
<script src="app.js"></script>
</body>
</html>
